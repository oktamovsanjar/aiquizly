<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Quizly Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
        },
        colors: {
          // shadcn-style neutral scale aliased to "zinc" defaults
          border: 'rgb(228 228 231)',
          ring: 'rgb(24 24 27)',
        },
        boxShadow: {
          card: '0 1px 2px 0 rgb(0 0 0 / 0.04), 0 1px 1px 0 rgb(0 0 0 / 0.02)',
          pop: '0 10px 30px -10px rgb(0 0 0 / 0.18), 0 4px 12px -4px rgb(0 0 0 / 0.08)',
        },
      },
    },
  };
</script>
<style>
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv11', 'ss01';
    color: #18181b;
    background: #fafafa;
  }
  /* numerals */
  .tnum { font-variant-numeric: tabular-nums; }
  /* hide scrollbar but keep scroll */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  /* shadcn-ish focus ring */
  .ring-base:focus-visible { outline: 2px solid rgb(24 24 27); outline-offset: 2px; }
  /* subtle grid bg for the canvas behind cards (used sparingly) */
  .bg-dot {
    background-image: radial-gradient(rgb(228 228 231) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  /* dialog backdrop fade */
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes popIn { from { opacity: 0; transform: translateY(4px) scale(.98) } to { opacity: 1; transform: translateY(0) scale(1) } }
  .anim-fade { animation: fadeIn .15s ease-out both; }
  .anim-pop { animation: popIn .18s cubic-bezier(.2,.7,.3,1) both; }
  /* toast slide */
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
  .anim-slide { animation: slideUp .22s cubic-bezier(.2,.7,.3,1) both; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/admin/static/tweaks-panel.jsx"></script>
<script type="text/babel" src="/admin/static/icons.jsx"></script>
<script type="text/babel" src="/admin/static/primitives.jsx"></script>
<script type="text/babel" src="/admin/static/data.jsx"></script>
<script type="text/babel" src="/admin/static/charts.jsx"></script>
<script type="text/babel" src="/admin/static/layout.jsx"></script>
<script type="text/babel" src="/admin/static/pages-login.jsx"></script>
<script type="text/babel" src="/admin/static/pages-dashboard.jsx"></script>
<script type="text/babel" src="/admin/static/pages-users.jsx"></script>
<script type="text/babel" src="/admin/static/pages-quizzes.jsx"></script>
<script type="text/babel" src="/admin/static/pages-imports.jsx"></script>
<script type="text/babel" src="/admin/static/pages-notifications.jsx"></script>
<script type="text/babel" src="/admin/static/pages-templates.jsx"></script>
<script type="text/babel" src="/admin/static/pages-settings.jsx"></script>
<script type="text/babel" src="/admin/static/app.jsx"></script>
</body>
</html>
