name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────── 1. Python Lint ───────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff check
        run: |
          ruff check services/bot services/ai-engine services/subscription services/admin-api \
            --ignore E501,E402

      - name: Black format check
        run: |
          black --check services/bot services/ai-engine services/subscription services/admin-api

  # ─────────────────── 2. Go Lint ───────────────────
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, game, notifier]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: golangci-lint — ${{ matrix.service }}
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/${{ matrix.service }}
          version: latest
          args: --timeout=5m

  # ─────────────────── 3. Python Unit Tests ───────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quiz_bot_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ai-engine deps
        run: |
          cd services/ai-engine
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run ai-engine unit tests
        run: |
          cd services/ai-engine
          pytest tests/unit/ -v \
            --cov=. \
            --cov-report=term \
            --cov-fail-under=15
        env:
          OPENAI_API_KEY: "sk-test-mock"
          DEEPSEEK_API_KEY: "sk-test-mock"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/quiz_bot_test"
          REDIS_URL: "redis://localhost:6379/2"
          AI_PROVIDER: "openai"

      - name: Install bot deps
        run: |
          cd services/bot
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run bot unit tests
        run: |
          cd services/bot
          pytest tests/unit/ -v \
            --cov=. \
            --cov-report=term \
            --cov-fail-under=15
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/quiz_bot_test"
          REDIS_URL: "redis://localhost:6379/1"
          TELEGRAM_BOT_TOKEN: "0:test-token"

  # ─────────────────── 4. Go Unit Tests ───────────────────
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [game, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go test ./... -cover -coverprofile=coverage.out -timeout 60s
          go tool cover -func=coverage.out | grep total || true

  # ─────────────────── 5. Deploy (faqat main) ───────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, test-go]
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=== git pull ==="
            git pull origin main

            echo "=== bot rebuild ==="
            docker compose build bot
            docker compose up -d bot

            echo "=== ai-engine rebuild ==="
            docker compose build ai-engine
            docker compose up -d ai-engine

            echo "=== ai-worker restart ==="
            if systemctl is-active --quiet quizly-ai-worker; then
              sudo systemctl restart quizly-ai-worker
            else
              docker compose build ai-worker
              docker compose up -d ai-worker
            fi

            echo "=== cleanup ==="
            docker image prune -f

            echo "=== Done: ${{ github.sha }} ==="
